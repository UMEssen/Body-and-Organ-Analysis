exclude: "^body_organ_analysis/_external/(nnunetv2|totalsegmentator)/"

# Pin the Node version for `language: node` hooks (e.g. markdownlint-cli2).
# Without this, pre-commit uses the runner's "system" Node. On the self-hosted
# runners that resolves to a stale Node that gets paired with a newer npm,
# producing "Cannot find module 'node:path'". Pinning makes nodeenv fetch a
# self-consistent node+npm pair instead.
default_language_version:
  node: "20.20.2"

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        language_version: python3.12
        additional_dependencies: ["types-pytz", "types-requests", "pytest"]

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx prettier --write --ignore-unknown
        language: system
        types_or: [html, css, json, javascript, xml, yaml, jinja]

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.21.2
    hooks:
      - id: pyproject-fmt
        types: [toml]
        # pyproject-fmt 2.21.2 (latest) declares no version cap on its companion
        # package toml-fmt-common, so it floats to the newest release and breaks:
        # 1.3.3 dropped the private `_build_cli` it imports ("cannot import name
        # '_build_cli'"), and 1.3.4 re-added it but now double-registers
        # `--table-format` (argparse "conflicting option string"). 1.3.2 is the
        # last release fully compatible with 2.21.2; pin it until pyproject-fmt
        # ships a release that caps the dependency.
        additional_dependencies: ["toml-fmt-common==1.3.2"]

  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 4.1.0
    hooks:
      - id: sqlfluff-fix
        name: sqlfluff-fix
        entry: sqlfluff fix --show-lint-violations --processes 0
          --disable-progress-bar
        language: python
        description: Fixes sql lint errors with `SQLFluff`
        types: [sql]
        require_serial: true
        additional_dependencies: []

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
        args: [--fix]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        # types: [markdown]
        exclude: \.(svg|png|jpg|jpeg)$

  - repo: local
    hooks:
      - id: export-requirements
        name: Export requirements
        entry: uv
        args:
          [
            export,
            --format,
            requirements.txt,
            --locked,
            --no-emit-local,
            --no-all-extras,
            --no-hashes,
            --output-file,
            requirements.txt,
          ]
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # Security
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        files: . # Always scan everything for secrets
