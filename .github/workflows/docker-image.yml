name: Upload to Docker

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  docker:
    # Skip weight-only releases (e.g. tag v1.0.0-weights). On workflow_dispatch
    # there is no release payload, so the condition is true and the job still runs.
    if: ${{ !endsWith(github.event.release.tag_name, '-weights') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: scripts/cli.dockerfile
            image: shipai/boa-cli
          - dockerfile: scripts/rabbitmq.dockerfile
            image: shipai/boa-rabbitmq
          - dockerfile: scripts/worker_gpu.dockerfile
            image: shipai/boa-worker-gpu
          - dockerfile: scripts/worker_cpu.dockerfile
            image: shipai/boa-worker-cpu
          - dockerfile: scripts/orthanc.dockerfile
            image: shipai/boa-orthanc
    steps:
      - name: Delete huge unnecessary tools folder
        run: rm -rf /opt/hostedtoolcache
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: Setup env vars
        run: |
          source ./scripts/generate_version.sh
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"
          echo "GIT_HASH=$GIT_HASH" >> "$GITHUB_ENV"
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to NVIDIA NGC (nvcr.io)
        uses: docker/login-action@v4
        with:
          registry: nvcr.io
          username: $oauthtoken
          password: ${{ secrets.NGC_API_KEY }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ env.PACKAGE_VERSION }}
