name: Upload to PyPi

on:
  release:
    types: [published]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    # Skip weight-only releases (e.g. tag v1.0.0-weights). On workflow_dispatch
    # there is no release payload, so the condition is true and the job still runs.
    if: ${{ !endsWith(github.event.release.tag_name, '-weights') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Build and publish
        run: |
          uv build
          uv publish --token ${{ secrets.PYPI_TOKEN }}
