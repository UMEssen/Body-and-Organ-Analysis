name: Docker GPU Test (self-hosted)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  docker:
    runs-on: [self-hosted, "Linux"]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: shipai/boa-cli:test
            dockerfile: scripts/cli.dockerfile
          #   - dockerfile: scripts/rabbitmq.dockerfile
          #     image: shipai/boa-rabbitmq
          #   - dockerfile: scripts/task_gpu.dockerfile
          #     image: shipai/boa-worker-gpu
          #   - dockerfile: scripts/task.dockerfile
          #     image: shipai/boa-worker-cpu
          #   - dockerfile: scripts/orthanc.dockerfile
          #     image: shipai/boa-orthanc
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      # - name: Build image
      #   run: |
      #     docker build -q -t ${{ matrix.image }} -f "${{ matrix.dockerfile }}" .
      - name: Download DICOM
        run: |
          zip_file="$GITHUB_WORKSPACE/test_images/dicoms.zip"
          dicom_dir="$GITHUB_WORKSPACE/test_images/dicoms"

          mkdir -p "$dicom_dir"
          curl --fail --show-error --silent --location \
            --max-time 120 \
            --get ${{ secrets.TCIA_API }} \
            --data-urlencode "SeriesInstanceUID=${{ secrets.TCIA_UID }}" \
            --data-urlencode "NewFileNames=Yes" \
            --output "$zip_file"
          unzip -q "$zip_file" -d "$dicom_dir"
          rm "$zip_file"
      - name: Run GPU inference with parameters
        run: |
          mkdir -p "$GITHUB_WORKSPACE/test_images/boa_cli"
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/src" \
            -v "$GITHUB_WORKSPACE/test_images/dicoms:/dicoms" \
            -v "$GITHUB_WORKSPACE/test_images/boa_cli/gpu_cnr:/workspace" \
            -v ~/.totalsegmentator/nnunet/results:/app/weights \
            -w /src \
            --runtime=nvidia \
            -e NVIDIA_VISIBLE_DEVICES=5 \
            -e DOCKER_USER=$(id -u):$(id -g) \
            -e HOME=/tmp \
            -e UV_CACHE_DIR=/tmp/uv-cache \
            --shm-size=8g --ulimit memlock=-1 --ulimit stack=67108864 \
            ${{ matrix.image }} \
            bash -lc 'uv sync --frozen --no-dev && python -m body_organ_analysis -m bca+heartchambers_highres -v --cnr-adjustment --theme dark -l "${{ secrets.LICENSE_NUMBER }}"'
