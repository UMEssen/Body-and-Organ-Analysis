name: Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    runs-on: [self-hosted, "${{ matrix.os }}"]
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            python-version: "3.12"
            architecture: x64
            upload-coverage: true
          - os: macOS
            python-version: "3.11"
            architecture: arm64
            upload-coverage: false
          - os: windows
            python-version: "3.12"
            architecture: x64
            upload-coverage: false

    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      # Pin pre-commit's hook cache to a workspace-local path so the cache
      # location is identical on Linux, macOS, and Windows.
      PRE_COMMIT_HOME: ${{ github.workspace }}/.cache/pre-commit
      # Force uv to use the Python installed by actions/setup-python rather
      # than downloading its own managed interpreter. On the self-hosted
      # macOS runner uv would otherwise pull an x86_64 build (the runner
      # binary is x86_64 under Rosetta), which breaks arm64-only wheels.
      UV_PYTHON_PREFERENCE: only-system
      UV_PYTHON: ${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.architecture }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Cache pre-commit hook envs
        uses: actions/cache@v5
        with:
          path: ${{ env.PRE_COMMIT_HOME }}
          key: precommit-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            precommit-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install Python dev dependencies
        run: uv sync --group dev

      - name: Install Node dependencies (prettier + plugins)
        run: npm install

      - name: Run pre-commit
        run: uv run pre-commit run -a --show-diff-on-failure

      # `make check` runs sh-check + compose-check + docker-check.
      # Linux only: the docker-/compose-checks need a working docker daemon.
      - name: Run make check
        if: matrix.os == 'linux'
        run: make check

      - name: Run tests
        if: ${{ !matrix.upload-coverage }}
        run: uv run pytest

      - name: Run tests with coverage
        if: matrix.upload-coverage
        run: uv run pytest --cov=body_organ_analysis --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: success() && matrix.upload-coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
